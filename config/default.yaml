# Dragon Pulse — Deterministic A-Share Scanner Configuration
# Two engines: mean_reversion + sniper, top 1000 by market cap

market:
  region: "CN"
  timezone: "Asia/Shanghai"
  close_hour_local: 15
  close_minute_local: 0

data:
  provider: "AUTO"
  china:
    primary: "akshare"
    backup: "tushare"
    adjust: "qfq"
    tushare_token_env: "TUSHARE_TOKEN"
  us:
    provider: "yahoo"

universe:
  mode: "CHINA_A"
  cache_file: "universe_cache_CHINA_A.csv"
  cache_max_age_days: 7
  exclude_st: true
  exclude_delisting_warning: true

# Required by config validator (legacy compat)
liquidity:
  min_price: 5.0
  min_avg_dollar_volume_20d: 50000000
  min_avg_volume: 1000000

technicals:
  rsi_period: 14
  ma_windows: [10, 20, 50]
  atr_period: 14
  lookback_days: 300

# =============================================================================
# MEAN REVERSION ENGINE — RSI(2) oversold bounces
# =============================================================================
# Active in ALL regimes (bull, choppy, bear)
mean_reversion:
  # Weights (must sum to 1.0)
  w_rsi2: 0.40
  w_trend: 0.25
  w_streak: 0.15
  w_proximity: 0.10
  w_volume: 0.10

  # Gates
  min_bars: 60
  adv_min_cny: 50000000        # 50M CNY floor
  max_single_day_move: 0.11    # reject split/bad-data artifacts
  rsi2_max: 10                 # RSI(2) oversold trigger
  score_floor: 65              # min composite to emit signal

  # Targets
  stop_atr_mult: 0.95
  target_1_atr_mult: 1.5
  target_2_atr_mult: 2.0
  max_entry_atr_mult: 0.1
  holding_period: 3
  subtype_split:
    enabled: true
    rsi2_bounce_max: 3.0
    streak_bounce_max: -3
    dist_from_5d_low_bounce_max: 0.75
    drift:
      stop_atr_mult: 1.0
      target_1_atr_mult: 1.25
      target_2_atr_mult: 2.0
      max_entry_atr_mult: 0.1
      holding_period: 4

  # Regime
  regime:
    csi300_symbol: "000300.SH"
    sma_short: 20
    sma_long: 50

# =============================================================================
# SNIPER ENGINE — BB squeeze + volume compression breakouts
# =============================================================================
# Bear regime → hard block. Score floors: 60 bull, 65 choppy
sniper:
  enabled: false  # quarantined — 21% win rate, -0.42% exp across all tests
  # Weights (must sum to 1.0)
  w_bb_squeeze: 0.30
  w_vol_compression: 0.25
  w_relative_strength: 0.20
  w_trend: 0.15
  w_momentum: 0.10

  # Hard gates
  atr_pct_floor: 3.5
  min_avg_volume: 1000000      # 1M shares floor
  bear_block: true

  # Score floors per regime
  score_floor_bull: 65
  score_floor_choppy: 70

  # Targets
  stop_atr_mult: 2.0
  target_atr_mult: 3.0
  target_2_atr_mult: 5.0
  holding_period: 7

  regime:
    csi300_symbol: "000300.SH"

# =============================================================================
# PORTFOLIO & RISK SETTINGS — Variable Book Size
# =============================================================================
book_size:
  breadth_floor: 0.15  # % of universe above SMA20 to allow any picks
  max_per_sector: 1    # max picks from same industry per day

  # Regime-specific constraints
  bull:
    max_picks: 2
    min_score: 65
  choppy:
    max_picks: 2
    min_score: 75
  bear:
    max_picks: 1
    min_score: 75  # Bear-regime MR has been weak recently, so size and quality are tighter

# =============================================================================
# ACCEPTANCE LAYER — app-level precision filter above engines
# =============================================================================
acceptance:
  enabled: true
  dq_full_threshold: 55       # day quality ≥ this → full mode (A+B tiers)
  dq_selective_threshold: 20  # day quality ≥ this → selective (A-tier only)
  max_full: 2                 # max picks in full mode
  max_selective: 2            # max picks in selective mode
  # Below dq_selective_threshold → abstain (0 picks)

# =============================================================================
# OUTPUT SETTINGS
# =============================================================================
outputs:
  root: "outputs"
  save_json: true
  save_csv: true

# =============================================================================
# RUNTIME SETTINGS
# =============================================================================
runtime:
  threads: true
  yf_auto_adjust: false
  method_version: "v4.0-scan"
  china_trading_days: true
  exclude_suspended: true

# =============================================================================
# CACHE SETTINGS
# =============================================================================
cache:
  enabled: true
  backend: "sqlite"
  sqlite_path: "data/price_cache.db"
  price_ttl_seconds: 3600
  news_ttl_seconds: 1800

# =============================================================================
# ALERTS
# =============================================================================
alerts:
  enabled: true
  channels: ["telegram", "file"]

# =============================================================================
# PREFLIGHT (morning check thresholds)
# =============================================================================
preflight:
  max_gap_up_pct: 3.0
  max_gap_down_pct: 5.0
  min_volume_ratio: 0.10
