name: CN Morning Check

on:
  schedule:
    # 09:26 Shanghai = 01:26 UTC (weekdays)
    - cron: "26 1 * * 1-5"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Shanghai"

concurrency:
  group: cn-morning
  cancel-in-progress: true

jobs:
  preflight:
    name: Pre-Flight Gap Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull latest to get nightly outputs
          ref: main

      - name: Find latest watchlist
        id: check
        run: |
          # The morning check runs BEFORE today's nightly scan, so we need
          # the most recent watchlist (typically yesterday's trading date).
          # Sort by date embedded in filename (not mtime, which is unreliable
          # after a fresh git checkout).
          LATEST_WL=$(ls outputs/*/execution_watchlist_*.json 2>/dev/null | sort -t_ -k3 -r | head -1)
          if [ -n "${LATEST_WL}" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            # Extract date from filename: execution_watchlist_YYYY-MM-DD.json
            TRADE_DATE=$(basename "${LATEST_WL}" | sed 's/execution_watchlist_//;s/\.json//')
            echo "trade_date=${TRADE_DATE}" >> "$GITHUB_OUTPUT"
            echo "Watchlist found: ${LATEST_WL} (trade date: ${TRADE_DATE})"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            TRADE_DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
            echo "trade_date=${TRADE_DATE}" >> "$GITHUB_OUTPUT"
            echo "No watchlist found. Nightly run may have failed or produced no picks."
          fi

      - name: Set up Python
        if: steps.check.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        if: steps.check.outputs.found == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning check
        if: steps.check.outputs.found == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAS_TELEGRAM_LOG_URL: ${{ secrets.MAS_TELEGRAM_LOG_URL }}
          MAS_API_SECRET_KEY: ${{ secrets.MAS_API_SECRET_KEY }}
        run: |
          TRADE_DATE="${{ steps.check.outputs.trade_date }}"
          python scripts/morning_check.py --date "${TRADE_DATE}"

      - name: Commit check results
        if: steps.check.outputs.found == 'true' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TRADE_DATE="${{ steps.check.outputs.trade_date }}"
          git add "outputs/${TRADE_DATE}/execution_check_${TRADE_DATE}.json" 2>/dev/null || true
          git add "outputs/${TRADE_DATE}/.morning_alert_sent" 2>/dev/null || true
          git add "outputs/${TRADE_DATE}/.morning_open_pending_sent" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No check results to commit"
          else
            git commit -m "auto: CN morning check for ${TRADE_DATE}"
            git push origin HEAD:main || {
              git fetch origin main
              git rebase origin/main
              git push origin HEAD:main
            }
          fi
