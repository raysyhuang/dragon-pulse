name: CN Nightly Analysis

on:
  schedule:
    # Primary: 16:30 Shanghai = 08:30 UTC (weekdays)
    - cron: "30 8 * * 1-5"
    # Backup: 18:00 Shanghai = 10:00 UTC (weekdays)
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Shanghai"

concurrency:
  group: cn-nightly
  cancel-in-progress: false

jobs:
  analyze:
    name: CN Nightly Scan
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute trading date
        id: date
        run: |
          # Use Shanghai timezone for trading date
          TRADE_DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          echo "trade_date=${TRADE_DATE}" >> "$GITHUB_OUTPUT"
          echo "Trading date: ${TRADE_DATE}"

      - name: Skip if watchlist already exists (backup run)
        id: check
        run: |
          TRADE_DATE="${{ steps.date.outputs.trade_date }}"
          WL_FILE="outputs/${TRADE_DATE}/execution_watchlist_${TRADE_DATE}.json"
          if [ -f "${WL_FILE}" ]; then
            echo "Watchlist already exists for ${TRADE_DATE}, skipping backup run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full analysis
        if: steps.check.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ADANOS_API_KEY: ${{ secrets.ADANOS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAS_TELEGRAM_LOG_URL: ${{ secrets.MAS_TELEGRAM_LOG_URL }}
          MAS_API_SECRET_KEY: ${{ secrets.MAS_API_SECRET_KEY }}
        run: |
          python main.py all --config config/default.yaml

      - name: Verify watchlist artifact
        if: steps.check.outputs.skip != 'true'
        run: |
          TRADE_DATE="${{ steps.date.outputs.trade_date }}"
          WL_FILE="outputs/${TRADE_DATE}/execution_watchlist_${TRADE_DATE}.json"
          if [ ! -f "${WL_FILE}" ]; then
            echo "WARNING: execution_watchlist not generated for ${TRADE_DATE}"
            # Don't fail — hybrid_analysis may still exist without picks
          else
            echo "Watchlist artifact verified: ${WL_FILE}"
            cat "${WL_FILE}" | python -m json.tool | head -30
          fi

      - name: Push results to Heroku API
        if: steps.check.outputs.skip != 'true' && success()
        env:
          KOOCORE_HEROKU_URL: ${{ secrets.KOOCORE_HEROKU_URL }}
          ENGINE_API_KEY: ${{ secrets.ENGINE_API_KEY }}
        run: |
          TRADE_DATE="${{ steps.date.outputs.trade_date }}"
          HYBRID_FILE="outputs/${TRADE_DATE}/hybrid_analysis_${TRADE_DATE}.json"
          if [ ! -f "${HYBRID_FILE}" ]; then
            echo "No hybrid_analysis file, skipping Heroku push"
            exit 0
          fi
          PAYLOAD=$(python -c "
          import json
          with open('${HYBRID_FILE}') as f:
              h = json.load(f)
          print(json.dumps({'hybrid_analysis': h, 'run_date': '${TRADE_DATE}', 'pipeline_duration_s': None}))
          ")
          curl -sS -X POST "${KOOCORE_HEROKU_URL}/api/engine/ingest" \
            -H "Content-Type: application/json" \
            -H "X-Engine-Key: ${ENGINE_API_KEY}" \
            -d "${PAYLOAD}" --max-time 30

      - name: Commit outputs
        if: steps.check.outputs.skip != 'true' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          if git diff --cached --quiet; then
            echo "No new outputs to commit"
          else
            TRADE_DATE="${{ steps.date.outputs.trade_date }}"
            git commit -m "auto: CN nightly outputs for ${TRADE_DATE}"
            git push origin HEAD:main || {
              git fetch origin main
              git rebase origin/main
              git push origin HEAD:main
            }
          fi

      - name: Upload outputs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cn-nightly-outputs
          path: outputs/**
          retention-days: 7
