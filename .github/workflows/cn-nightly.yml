name: CN Nightly Analysis

on:
  schedule:
    # Primary: 16:30 Shanghai = 08:30 UTC (weekdays)
    - cron: "30 8 * * 1-5"
    # Backup: 18:00 Shanghai = 10:00 UTC (weekdays)
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Shanghai"

concurrency:
  group: cn-nightly
  cancel-in-progress: false

jobs:
  analyze:
    name: CN Nightly Scan
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute trading date
        id: date
        run: |
          TRADE_DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          echo "trade_date=${TRADE_DATE}" >> "$GITHUB_OUTPUT"
          echo "Trading date: ${TRADE_DATE}"

      - name: Skip if watchlist already exists (backup run)
        id: check
        run: |
          TRADE_DATE="${{ steps.date.outputs.trade_date }}"
          WL_FILE="outputs/${TRADE_DATE}/execution_watchlist_${TRADE_DATE}.json"
          if [ -f "${WL_FILE}" ]; then
            echo "Watchlist already exists for ${TRADE_DATE}, skipping backup run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: CN provider smoke test
        if: steps.check.outputs.skip != 'true'
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          python scripts/smoke_cn_provider.py --config config/default.yaml

      - name: Run scan
        if: steps.check.outputs.skip != 'true'
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAS_TELEGRAM_LOG_URL: ${{ secrets.MAS_TELEGRAM_LOG_URL }}
          MAS_API_SECRET_KEY: ${{ secrets.MAS_API_SECRET_KEY }}
          DRAGON_PULSE_SKIP_TELEGRAM: "1"
        run: |
          python main.py scan --config config/default.yaml

      - name: Verify watchlist artifact
        if: steps.check.outputs.skip != 'true'
        run: |
          TRADE_DATE="${{ steps.date.outputs.trade_date }}"
          WL_FILE="outputs/${TRADE_DATE}/execution_watchlist_${TRADE_DATE}.json"
          if [ ! -f "${WL_FILE}" ]; then
            echo "WARNING: execution_watchlist not generated for ${TRADE_DATE}"
          else
            echo "Watchlist artifact verified: ${WL_FILE}"
            cat "${WL_FILE}" | python -m json.tool | head -30
          fi

      - name: Commit outputs
        if: steps.check.outputs.skip != 'true' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ data/bad_tickers.json
          if git diff --cached --quiet; then
            echo "No new outputs to commit"
          else
            TRADE_DATE="${{ steps.date.outputs.trade_date }}"
            git commit -m "auto: CN nightly outputs for ${TRADE_DATE}"
            pushed=false
            for i in 1 2 3; do
              if git push origin HEAD:main; then
                pushed=true
                break
              fi
              echo "Push failed (attempt $i/3), rebasing..."
              git stash push --include-untracked --message "cn-nightly-rebase-${i}" || true
              git fetch origin main
              git rebase origin/main
              git stash pop || true
            done
            if [ "${pushed}" != "true" ]; then
              echo "Failed to push CN nightly outputs after 3 attempts"
              exit 1
            fi
          fi

      - name: Upload outputs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cn-nightly-outputs
          path: outputs/**
          retention-days: 7
